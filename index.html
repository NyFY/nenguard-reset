<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NENGuard — Passwort zurücksetzen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #EAF5FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(8,37,64,0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo svg { width: 48px; height: 48px; }
        .logo h1 {
            font-size: 24px;
            color: #082540;
            margin-top: 8px;
        }
        .logo p {
            color: #6B7B8D;
            font-size: 14px;
            margin-top: 4px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #082540;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #D1DBE5;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #4B91B9;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #4B91B9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }
        .btn:hover { background: #3A7A9E; }
        .btn:disabled {
            background: #B0C4D4;
            cursor: not-allowed;
        }
        .error {
            background: #FFF0F0;
            color: #C62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .success {
            text-align: center;
            display: none;
        }
        .success .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .success h2 {
            color: #2E7D32;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .success p {
            color: #6B7B8D;
            font-size: 14px;
        }
        .success .app-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #082540;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .hint {
            font-size: 12px;
            color: #6B7B8D;
            margin-top: 6px;
        }
        .loading { display: none; text-align: center; margin-top: 16px; color: #4B91B9; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Form -->
        <div id="form-section">
            <div class="logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="12" fill="#082540"/>
                    <path d="M24 8L36 16V28C36 34 30 39 24 40C18 39 12 34 12 28V16L24 8Z" stroke="white" stroke-width="2.5" fill="none"/>
                    <rect x="18" y="20" width="12" height="10" rx="2" stroke="white" stroke-width="2"/>
                    <circle cx="24" cy="25" r="1.5" fill="white"/>
                    <line x1="24" y1="25" x2="24" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>NENGuard</h1>
                <p>Neues Passwort festlegen</p>
            </div>

            <label for="password">Neues Passwort</label>
            <input type="password" id="password" placeholder="Mindestens 8 Zeichen" autocomplete="new-password">
            <p class="hint">Min. 8 Zeichen, Groß-/Kleinbuchstaben, Zahl</p>

            <label for="confirm">Passwort bestätigen</label>
            <input type="password" id="confirm" placeholder="Passwort wiederholen" autocomplete="new-password">

            <div class="error" id="error"></div>
            <div class="loading" id="loading">Wird gespeichert...</div>

            <button class="btn" id="submit-btn" onclick="resetPassword()">Passwort ändern</button>
        </div>

        <!-- Success -->
        <div class="success" id="success-section">
            <div class="icon">✅</div>
            <h2>Passwort geändert</h2>
            <p>Ihr Passwort wurde erfolgreich geändert. Sie können sich jetzt mit dem neuen Passwort in der App anmelden.</p>
            <a href="nenguard://auth-callback" class="app-link">App öffnen</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Client
        const SUPABASE_URL = 'https://awldrvolmdlxvcdbfhkz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3bGRydm9sbWRseHZjZGJmaGt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMzNTk5NzQsImV4cCI6MjA1ODkzNTk3NH0.YESMystDBaJvMGwExTz3p-O-k8FvcEqSa8OjJBR53ls';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Handle PKCE code exchange + session recovery
        async function init() {
            // PKCE flow: Supabase sends ?code=xxx in the URL
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code) {
                // Exchange the PKCE code for a session
                const { error } = await supabase.auth.exchangeCodeForSession(code);
                if (error) {
                    showError('Ungültiger oder abgelaufener Link. Bitte fordern Sie einen neuen Link an.');
                    return;
                }
                // Clean URL so the code doesn't stay in browser history
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Verify we have an active session
            const { data, error } = await supabase.auth.getSession();
            if (error || !data.session) {
                showError('Ungültiger oder abgelaufener Link. Bitte fordern Sie einen neuen Link an.');
            }
        }
        init();

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('submit-btn');

            errorDiv.style.display = 'none';

            if (password.length < 8) {
                showError('Das Passwort muss mindestens 8 Zeichen lang sein.');
                return;
            }
            if (password !== confirm) {
                showError('Die Passwörter stimmen nicht überein.');
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';

            try {
                const { data, error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    showError('Fehler: ' + error.message);
                    btn.disabled = false;
                    loading.style.display = 'none';
                    return;
                }

                // Success
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-section').style.display = 'block';
            } catch (e) {
                showError('Ein Fehler ist aufgetreten: ' + e.message);
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // Enter key submits
        document.getElementById('confirm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetPassword();
        });
    </script>
</body>
</html>
